<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons</title>
</head>

<body>

<div class="container">
    <button onclick="change_color(this)" id="green">Button 1</button>
    <button onclick="change_color(this)" id="red">Button 2</button>
    <button onclick="change_color(this)" id="blue">Button 3</button>
</div>

</body>
</html>

<style>
body{
    background-color: gray;
    color: white;
    padding: 10px;
}

.container{
    background-color: white;
    width: 600px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    height: 100px;
}

button{
    color: white;
    width: 100px;
    height: 50px;
}

#green{
    background-color: green;
}

#red{
    background-color: red;
}

#blue{
    background-color: blue;
}
</style>

<script>
function change_color(button){
    document.body.style.backgroundColor = button.id;
}
</script>
