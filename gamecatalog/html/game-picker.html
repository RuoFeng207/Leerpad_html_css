<!DOCTYPE html>
<html class="game_picker" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ruo Feng Somers">
    <meta name="keywords" content="game, list, shop">
    <link rel="stylesheet" href="../css/style.css">
    <title>Game picker</title>
</head>

<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Hades</a></li>
            <li><a href="potion-craft.html">Potion Craft</a></li>
            <li><a href="new-pokemon-snap.html">New Pokemon Snap</a></li>
            <li><a class="active" href="game-picker.html">Game Picker</a></li>

            <li class="navbar_right"><a href="../../">Main</a></li>
        </ul>
    </nav>
    <main class="container">
        <h1>Game picker</h1>
        <label for="filter">Filter prijs:</label>
        <select name="filter_price" id = "filter_price" class="filter">
            <option value="all">All</option>
            <option value="gratis">Gratis</option>
            <option value=">10">Meer dan €10</option>
            <option value=">20">Meer dan €20</option>
        </select>
        <label for="filter_genre">Filter genre</label>
        <select name="filter_genre" id="filter_genre" class="filter">
            <option value="all">All</option>
            <option value="fps">FPS</option>
            <option value="moba">MOBA</option>
            <option value="action">Action</option>
            <option value="rpg">RPG</option>
            <option value="sim">Simulation</option>
            <option value="shooter"> Looter-shooter</option>
            <option value="sport">Sport</option>
            <option value="sandbox">Sandbox</option>
            <option value="rougelike">Rougelike</option>
            <option value="advanture">Advanture</option>
            
        </select>
        <div class="gamelist"></div>
        <button class="submit_button">Bereken prijs</button>

    </main>
    <footer>
        Ruo Feng Somers 2026
    </footer>
    <script type="module" src="../js/game_picker.js"></script>
</body>

</html>
